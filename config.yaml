# Viewer configuration (viewer.py)

animation:
  duration: 1.0   # seconds — open / close animation time
  fps: 60

controls:
  pan_step:  15.0   # mm — arrow keys (pan)
  rot_step:  4.0    # degrees — Shift+arrows
  zoom_step: 0.12   # multiplier — Ctrl+arrows and scroll wheel

initial_view:
  rot_x: 0.0          # degrees around X axis (0 = horizontal, eye-level view)
  rot_y: -35.0        # degrees around Z axis
  zoom:  1.0
  eye_height: 1500    # mm — camera height above floor for default view

transparency:
  inactive: 0.15   # other boards when one is selected (0.0–1.0)
  selected: 0.50   # selected board (0.0–1.0)
